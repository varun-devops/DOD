<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | DOD Healthcare</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body class="login-body">

  <div class="login-container">
    <div class="login-card">

      <!-- Logo & Title -->
      <div class="login-header">
        <div class="login-logo">
          <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="30" cy="30" r="30" fill="url(#grad)"/>
            <path d="M30 15v30M15 30h30" stroke="white" stroke-width="5" stroke-linecap="round"/>
            <defs>
              <linearGradient id="grad" x1="0" y1="0" x2="60" y2="60">
                <stop offset="0%" stop-color="#0ea5e9"/>
                <stop offset="100%" stop-color="#6366f1"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <h1>DOD Healthcare</h1>
        <p>Admin Control Panel</p>
      </div>

      <!-- Alert -->
      <div class="alert" id="alert" style="display:none;"></div>

      <!-- Login Form -->
      <form id="loginForm" class="login-form">
        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
            <input type="email" id="email" placeholder="admin@dodhealthcare.com" required autocomplete="email" />
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password" />
            <button type="button" class="toggle-password" id="togglePassword" title="Show password">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-login" id="loginBtn">
          <span id="loginBtnText">Login to Admin Panel</span>
          <svg class="btn-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </form>

      <p class="login-footer">DOD Healthcare Kiosk &copy; 2026 | Amazemedics Pvt.Ltd.</p>
    </div>
  </div>

  <script>
    // ─── Config ─────────────────────────────────────────────────────────────
    const API_BASE = 'https://api.dodsmarthealth.com/api';
    // For local dev: const API_BASE = 'http://localhost:5000/api';

    // ─── Toggle password ────────────────────────────────────────────────────
    document.getElementById('togglePassword').addEventListener('click', () => {
      const input = document.getElementById('password');
      input.type = input.type === 'password' ? 'text' : 'password';
    });

    // ─── Show alert ─────────────────────────────────────────────────────────
    function showAlert(message, type = 'error') {
      const alert = document.getElementById('alert');
      alert.textContent = message;
      alert.className = `alert alert-${type}`;
      alert.style.display = 'block';
      setTimeout(() => { alert.style.display = 'none'; }, 5000);
    }

    // ─── Redirect if already logged in ──────────────────────────────────────
    if (localStorage.getItem('dod_admin_token')) {
      window.location.href = 'dashboard.html';
    }

    // ─── Login Form Submit ───────────────────────────────────────────────────
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const btnText = document.getElementById('loginBtnText');

      btn.disabled = true;
      btnText.textContent = 'Logging in...';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });

        const data = await res.json();

        if (!res.ok || !data.success) {
          showAlert(data.message || 'Login failed. Check credentials.');
        } else {
          localStorage.setItem('dod_admin_token', data.token);
          localStorage.setItem('dod_admin_info', JSON.stringify(data.admin));
          showAlert('Login successful! Redirecting...', 'success');
          setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);
        }
      } catch (err) {
        showAlert('Cannot connect to server. Make sure backend is running.');
      } finally {
        btn.disabled = false;
        btnText.textContent = 'Login to Admin Panel';
      }
    });
  </script>
</body>
</html>
